kind = "web"
previewPath = "/"
title = "Fnashha - فنشها"
version = "1.0.0"
id = "artifacts/fnashha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24420

[services.development]
run = "pnpm --filter @workspace/fnashha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fnashha", "run", "build" ]
publicDir = "artifacts/fnashha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24420"
BASE_PATH = "/"
